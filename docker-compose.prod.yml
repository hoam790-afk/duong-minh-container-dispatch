services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: duong_minh_dispatch_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_DEFAULT_MODEL: ${OPENROUTER_DEFAULT_MODEL}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: duong_minh_dispatch_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: duong_minh_dispatch
      POSTGRES_USER: duongminh
      POSTGRES_PASSWORD: duongminh2026
    volumes:
      - duong_minh_dispatch_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U duongminh -d duong_minh_dispatch"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  duong_minh_dispatch_pg:
